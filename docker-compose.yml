services:
  mginx:
    container_name: mginx
    image: opisek/mginx:latest
    volumes:
      - /srv/mginx/scripts:/app/scripts:ro
      - /srv/mginx/config.yml:/app/config.yml:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    network_mode: host
    environment:
      - CONFIG=./config.yml
      - PORT=25565
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile